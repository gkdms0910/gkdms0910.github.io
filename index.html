<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>주섬주섬</title>
    <meta
      name="description"
      content="주섬주섬은 링크, 상품, 장소, 영상, 글감을 가볍게 담아두고 나중에 다시 꺼내보는 보관 앱입니다."
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #171412;
        --muted: #6f6760;
        --line: #eadfd2;
        --paper: #fff8ef;
        --accent: #ed6a45;
        --accent-soft: #ffe1c4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          ui-rounded,
          "Apple SD Gothic Neo",
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background:
          radial-gradient(circle at 18% 12%, #ffe5b9 0 22%, transparent 34%),
          radial-gradient(circle at 86% 18%, #ffd6c9 0 18%, transparent 32%),
          linear-gradient(135deg, #fffaf2 0%, #f6ede1 100%);
        color: var(--ink);
      }

      main {
        width: min(960px, calc(100% - 40px));
        margin: 0 auto;
        padding: 72px 0 56px;
      }

      .hero {
        display: grid;
        gap: 26px;
        padding: 48px;
        border: 1px solid rgba(234, 223, 210, 0.82);
        border-radius: 36px;
        background: rgba(255, 248, 239, 0.72);
        box-shadow: 0 28px 80px rgba(68, 49, 29, 0.12);
        backdrop-filter: blur(18px);
      }

      .mark {
        width: 58px;
        height: 58px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: var(--accent-soft);
        color: var(--ink);
        font-size: 28px;
        font-weight: 900;
        letter-spacing: -0.08em;
      }

      h1 {
        margin: 0;
        font-size: clamp(42px, 9vw, 84px);
        line-height: 0.94;
        letter-spacing: -0.08em;
      }

      p {
        margin: 0;
        max-width: 620px;
        color: var(--muted);
        font-size: clamp(18px, 2.4vw, 23px);
        line-height: 1.65;
        letter-spacing: -0.03em;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 8px;
      }

      a {
        color: inherit;
      }

      .button {
        display: inline-flex;
        align-items: center;
        min-height: 48px;
        padding: 0 18px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fffaf3;
        text-decoration: none;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .button.primary {
        border-color: transparent;
        background: var(--accent);
        color: white;
      }

      footer {
        margin-top: 24px;
        color: var(--muted);
        font-size: 13px;
        letter-spacing: -0.02em;
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 28px, 960px);
          padding-top: 34px;
        }

        .hero {
          padding: 30px 24px;
          border-radius: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" aria-labelledby="title">
        <div class="mark" aria-hidden="true">ㅈㅅ</div>
        <h1 id="title">주섬주섬</h1>
        <p>
          지금 바로 정리하지 않아도 괜찮습니다. 사고 싶은 것, 보고 싶은 것,
          가보고 싶은 곳을 한곳에 담아두고 필요할 때 다시 꺼내보세요.
        </p>
        <nav class="links" aria-label="앱 정보">
          <a class="button primary" href="support.html">지원</a>
          <a class="button" href="privacy.html">개인정보 처리방침</a>
          <a class="button" href="app-ads.txt">app-ads.txt</a>
        </nav>
      </section>
      <footer>© 2026 DayPixel. All rights reserved.</footer>
    </main>
  </body>
</html>
